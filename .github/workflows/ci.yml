name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# CI Jobs only need read-only access to the Repo conents
permissions:
  contents: read

jobs:
  build-fuzzer:
    name: Build Fuzzer binary
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            protobuf-compiler \
            libabsl-dev \
            libprotobuf-dev \
            binutils \
            liblzma-dev \
            libz-dev \
            pkg-config \
            autoconf \
            libtool \
            openssl \
            libssl-dev \
            libclang-rt-dev \
            libtss2-dev \
            clang \
            llvm \
            cmake \
            ninja-build

          echo "Compiler:"
          ${CXX} --version
          echo "OpenSSL:"
          openssl version

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER="${CC}" \
            -DCMAKE_CXX_COMPILER="${CXX}" \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DOPENSSL_ROOT_DIR=/usr

      - name: Build unstructured fuzzer
        run: cmake --build build --target Fuzzer

      - name: Build structured fuzzer
        run: cmake --build build --target proto-fuzzer

      - name: Verify
        run: ./build/Fuzzer -help=1
  docker-build-fuzzer:
    name: Test Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Build
        uses: docker/build-push-action@v6
        with:
          push: false
          pull: false
          file: Dockerfile
          target: fuzzer
          tags: SUSE-26-03-Google/fuzzer:latest

  format:
    name: Check code format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - 'src'
          - 'include'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check format
        run: |
          cd ${{ matrix.path }}
          files=$(find . -type f \( -name '*.c' -o -name '*.cc' -o -name '*.h' -o -name '*.hpp' \))
          if [ -z "$files" ]; then
            echo "No C/C++ files found in ${{ matrix.path }}"
            exit 0
          fi
          clang-format --style=Google --dry-run --Werror $files

  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Build test image
        run: |
          docker build --target test -t tpm-unit-tests .

      - name: Run unit tests
        run: |
          docker run --rm tpm-unit-tests
