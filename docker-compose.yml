services:
  tpm-simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    ports:
      - "2321:2321"
      - "2322:2322"
  tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    container_name: tpm-tools
    environment:
      - TPM2TOOLS_TCTI=mssim:host=tpm-simulator,port=2321
    depends_on:
      - tpm-simulator
    tty: true
  fuzzer:
    build:
      context: .
      dockerfile: Dockerfile.fuzzer
    volumes:
      - ./corpus:/srv/corpus
      - ./coverage:/srv/build/coverage
    environment:
      - LLVM_PROFILE_FILE=/srv/build/Fuzzer.profraw
