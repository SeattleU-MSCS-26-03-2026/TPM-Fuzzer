services:
  tpm-simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    ports:
      - "2321:2321"
      - "2322:2322"
  tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    container_name: tpm-tools
    environment:
      - TPM2TOOLS_TCTI=mssim:host=tpm-simulator,port=2321
    depends_on:
      - tpm-simulator
    tty: true
  fuzzer:
    build:
      context: .
      dockerfile: Dockerfile.fuzzer
    volumes:
      - ./corpus:/srv/corpus
      - ./coverage:/srv/build/coverage
    environment:
      - FUZZER_COVERAGE_OUTPUT_DIR=/srv/build/coverage
      - GEN_CORPUS_DIR=/srv/corpus
      - SEED_CORPUS_DIR=/srv/seeds
      - FUZZER_MAX_RUNS=100000
      - FUZZER_EXTRA_ARGS=-seed=38912891
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
