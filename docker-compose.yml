services:
  tpm-simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    ports:
      - "2321:2321"
      - "2322:2322"
  tools:
    build:
      context: .
      dockerfile: docker/Dockerfile.tools
    container_name: tpm-tools
    environment:
      - TPM2TOOLS_TCTI=mssim:host=tpm-simulator,port=2321
    depends_on:
      - tpm-simulator
    tty: true
  fuzzer:
    build:
      context: .
      dockerfile: Dockerfile
      target: fuzzer
    volumes:
      - ./corpus:/srv/corpus
      - ./seeds:/srv/seeds
      - ./artifacts:/srv/artifacts
      - ./coverage:/srv/build/coverage
    environment:
      FUZZER_EXTRA_ARGS: -seed=38912891 -runs=100000
      GEN_COVERAGE: "1"
      FUZZER_BIN_NAME: "Fuzzer"
  proto-fuzzer:
    build:
      context: .
      dockerfile: Dockerfile
      target: fuzzer
    volumes:
      - ./proto-corpus:/srv/corpus
      - ./proto-seeds:/srv/seeds
      - ./proto-artifacts:/srv/artifacts
      - ./proto-coverage:/srv/build/coverage
    environment:
      FUZZER_EXTRA_ARGS: -seed=38912891 -runs=100000
      GEN_COVERAGE: "1"
      FUZZER_BIN_NAME: "proto-fuzzer"
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
