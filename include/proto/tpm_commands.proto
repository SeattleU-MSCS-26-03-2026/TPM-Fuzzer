syntax = "proto3";

package tpm;

import "commands/tpm_getrandom.proto";
import "commands/tpm_create.proto";
import "commands/tpm_createprimary.proto";
import "commands/tpm_startauthsession.proto";

message TPMCommand {
  oneof command {
    commands.TPMGetRandom        getrandom        = 1;
    commands.TPMCreate           create           = 2;
    commands.TPMCreatePrimary    createprimary    = 3;
    commands.TPMStartAuthSession startauthsession = 4;
  }
}

message TPMCommandSequence {
  repeated TPMCommand commands = 1;
}
