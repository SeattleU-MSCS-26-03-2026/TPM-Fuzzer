syntax = "proto3";

package tpm;

import "tpm_commands/tpm_getrandom.proto";
import "tpm_commands/tpm_create.proto";
import "tpm_commands/tpm_createprimary.proto";
import "tpm_commands/tpm_startauthsession.proto";
import "tpm_commands/tpm_rsa_decrypt.proto";
import "tpm_commands/tpm_clear.proto";

message TPMCommand {
  oneof command {
    tpm_commands.TPMGetRandom        getrandom        = 1;
    tpm_commands.TPMCreate           create           = 2;
    tpm_commands.TPMCreatePrimary    createprimary    = 3;
    tpm_commands.TPMStartAuthSession startauthsession = 4;
    tpm_commands.TPMRSADecrypt       rsadecrypt       = 5;
    tpm_commands.TPMClear            clear            = 6;
  }
}

message TPMCommandSequence {
  repeated TPMCommand commands = 1;
}
