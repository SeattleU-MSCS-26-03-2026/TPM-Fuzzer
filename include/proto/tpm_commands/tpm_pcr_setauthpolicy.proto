syntax = "proto3";

package tpm_commands;

import "tpm_types/tpm_header.proto";
import "tpm_types/tpm_session.proto";
import "tpm_types/tpm2b_digest.proto";
import "constants/tpm_alg.proto";

message TPMPCRSetAuthPolicy {
  tpm_types.TPMHeader header = 1;
  uint32 auth_handle = 2;
  repeated tpm_types.TPMSession sessions = 3;
  tpm_types.TPM2BDigest authPolicy = 4;
  constants.TPMALG hashAlg = 5;
  uint32 pcrNum = 6;
}
