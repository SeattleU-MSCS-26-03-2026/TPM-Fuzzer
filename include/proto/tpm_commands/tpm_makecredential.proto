syntax = "proto3";

package tpm_commands;

import "tpm_types/tpm_header.proto";
import "tpm_types/tpm2b_data.proto";

message TPMMakeCredential {
  tpm_types.TPMHeader header      = 1;
  uint32              handle      = 2;
  tpm_types.TPM2BData credential  = 3;
  tpm_types.TPM2BData object_name = 4;
}
