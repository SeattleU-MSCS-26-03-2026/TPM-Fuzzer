syntax = "proto3";

package types;

import "constants/tpm_alg.proto";

message TPMSPCRSelection {
  constants.TPMALG hash          = 1;
  uint32           sizeof_select = 2; // uint8
  bytes            pcr_select    = 3;
}

message TPMLPCRSelection {
  uint32                    count          = 1;
  repeated TPMSPCRSelection pcr_selections = 2;
}
