syntax = "proto3";

package commands;

import "types/tpm_header.proto";
import "constants/tpm_rh.proto";
import "constants/tpm_se.proto";
import "constants/tpm_alg.proto";
import "types/tpm2b_data.proto";
import "types/tpmt_sym_def.proto";

message TPMStartAuthSession {
  types.TPMHeader  header         = 1;
  constants.TPMRH  tpm_key        = 2;
  constants.TPMRH  bind           = 3;
  types.TPM2BData  nonce          = 4;
  types.TPM2BData  encrypted_salt = 5;
  constants.TPMSE  session_type   = 6;
  types.TPMTSymDef symmetric      = 7;
  constants.TPMALG auth_hash      = 8;
}
